<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khu nông sản - Chợ phiên Vân Hồ</title>
<script src="data.js"></script>
<style>
:root{--green:#0b6b3a;--green2:#0e8a4d;--gold:#f3c15f;--dark:#123524;--bg:#f7faf5;--text:#1f2937}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}a{text-decoration:none}
nav{position:sticky;top:0;z-index:20;background:rgba(11,107,58,.94);color:white;padding:13px 7%;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px #0002}
nav a,nav b{color:white}.hero{padding:70px 7%;color:white;background:linear-gradient(120deg,#073d25ee,#0b6b3aaa);background-size:cover;background-position:center}.hero h1{font-size:clamp(40px,6vw,72px);margin:0 0 12px}.hero p{font-size:20px;line-height:1.5;max-width:900px}
section{padding:60px 7%}.title{text-align:center;margin-bottom:30px}.title h2{font-size:38px;color:var(--dark);margin:0 0 8px}.title p{color:#607080;font-size:18px;margin:0}
.shops{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.shop{background:white;border-radius:20px;padding:20px;border-top:5px solid var(--green2);box-shadow:0 10px 25px #0001}.shop h3{color:var(--green);margin:0 0 8px}
.album{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.album img{width:100%;height:210px;object-fit:cover;border-radius:18px;cursor:pointer;box-shadow:0 8px 20px #0002}
.lightbox{display:none;position:fixed;inset:0;background:#000d;z-index:100;align-items:center;justify-content:center;padding:20px}.lightbox img{max-width:96vw;max-height:90vh;border-radius:16px}.lightbox.show{display:flex}
footer{text-align:center;background:#08351f;color:white;padding:30px 7%}
@media(max-width:900px){.shops,.album{grid-template-columns:1fr 1fr}}
@media(max-width:560px){section{padding:48px 5%}.shops,.album{grid-template-columns:1fr}.album img{height:230px}}
</style>
</head>
<body>
<nav><b>🌿 CHỢ PHIÊN VÂN HỒ</b><a href="index.html">← Về trang chính</a></nav>
<header class="hero" id="hero"><h1 id="pageTitle"></h1><p id="pageDesc"></p></header>
<section><div class="title"><h2>Gian hàng trong khu vực</h2><p>Các nội dung, sản phẩm và hoạt động liên quan</p></div><div class="shops" id="shops"></div></section>
<section><div class="title"><h2>Album ảnh</h2><p>Hiển thị tự động từ ảnh 01.jpg đến 100.jpg trong đúng thư mục</p></div><div class="album" id="albumGrid"></div></section>
<footer><h3>CHỢ PHIÊN VÂN HỒ</h3><p>Không gian số quảng bá văn hóa, du lịch và sản phẩm địa phương</p></footer>
<div class="lightbox" id="lightbox"><img id="lightboxImg"></div>
<script>
const PAGE_ID="nong-san";
const section=SITE_DATA.sections.find(s=>s.id===PAGE_ID);
const pad=n=>String(n).padStart(2,"0");
const imagePath=n=>`${section.folder}/${pad(n)}.jpg`;
const pageTitle=document.getElementById("pageTitle");
const pageDesc=document.getElementById("pageDesc");
const hero=document.getElementById("hero");
const shops=document.getElementById("shops");
const albumGrid=document.getElementById("albumGrid");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightboxImg");

pageTitle.textContent=section.icon+" "+section.title;
pageDesc.textContent=section.description;
hero.style.backgroundImage=`linear-gradient(120deg,#073d25ee,#0b6b3aaa),url('${imagePath(1)}')`;

SITE_DATA.shops.filter(s=>s.section===PAGE_ID).forEach(s=>{
  shops.innerHTML+=`<div class="shop"><h3>${s.name}</h3><p><b>${s.group}</b></p><p>${s.desc}</p></div>`;
});
if(!shops.innerHTML.trim()) shops.innerHTML="<p>Chưa cập nhật gian hàng.</p>";

for(let i=1;i<=(SITE_DATA.imageMax||100);i++){
  const src=imagePath(i);
  const img=document.createElement("img");
  img.src=src;
  img.onerror=()=>img.remove();
  img.onclick=()=>{lightboxImg.src=src;lightbox.classList.add("show")};
  albumGrid.appendChild(img);
}
lightbox.onclick=()=>lightbox.classList.remove("show");
</script>
</body>
</html>
